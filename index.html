<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPUU SMART BOT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght=400;600;700;800&family=DM+Sans:wght=300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070f1e;
            --surface: #0d1b33;
            --surface2: #14284b;
            --border: rgba(58, 134, 255, 0.15);
            --accent: #3a86ff;
            --accent2: #00bbf9;
            --accent3: #4cc9f0;
            --text: #f0f5ff;
            --muted: rgba(240, 245, 255, 0.5);
            --radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            padding-bottom: 90px;
        }

        .header {
            padding: 24px 16px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(13,27,51,0.8), transparent);
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(58, 134, 255, 0.4);
            margin-bottom: 12px;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .header p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            gap: 6px;
            padding: 0 16px;
            margin-bottom: 20px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(58, 134, 255, 0.3);
        }

        .view-section { display: none; padding: 0 16px; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 12px;
        }

        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 16px;
        }

        .search-box input, .search-box select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
        }

        .search-box select option {
            background: var(--surface2);
            color: var(--text);
        }

        .search-box input:last-child, .search-box select:last-child { margin-bottom: 0; }

        .btn {
            background: var(--accent2);
            color: #000;
            font-weight: 700;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .toggle-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .toggle-btn.active {
            background: rgba(255, 77, 77, 0.2);
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(13, 27, 51, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--muted);
            font-size: 11px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            gap: 4px;
        }

        .nav-item.active { color: var(--accent3); font-weight: 700; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://raw.githubusercontent.com/250313-lab/image/main/photo_2026-05-30_19-09-13.jpg" class="logo-img" alt="NPUU Logo" onerror="this.src='https://raw.githubusercontent.com/250313-lab/image/master/photo_2026-05-30_19-09-13.jpg'">
        <h1>NPUU SMART BOT</h1>
        <p>Talabalar uchun raqamli boshqaruv muhiti</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchView('resit')">🚫 Resit Exam</button>
        <button class="tab-btn" onclick="switchView('gpa')">🧮 GPA Calc</button>
        <button class="tab-btn" onclick="switchView('syllabus')">📄 Syllabus</button>
        <button class="tab-btn" onclick="switchView('profs')">👥 Professors</button>
    </div>

    <div id="view-resit" class="view-section active">
        <div class="search-box">
            <input type="text" id="search-name" placeholder="🔍 Ism bo'yicha qidirish...">
            <select id="search-group">
                <option value="">🏫 Guruhni tanlang</option>
            </select>
            <select id="search-room">
                <option value="">🔑 Xonani tanlang</option>
            </select>
            <select id="search-subject">
                <option value="">📚 Fanni tanlang</option>
            </select>
        </div>
        <button id="btn-fail-toggle" class="toggle-btn">🚫 Faqat ruxsat berilmaganlar</button>
        <div id="exam-list"></div>
    </div>

    <div id="view-gpa" class="view-section">
        <div class="card" style="margin-bottom:16px;">
            <div style="font-size:13px; color:var(--muted); margin-bottom:4px;">Sizning umumiy natijangiz:</div>
            <div id="gpa-result" style="font-family:'Syne',sans-serif; font-size:36px; font-weight:800; color:var(--accent2);">0.00</div>
        </div>
        <div id="gpa-rows"></div>
        <button class="btn" style="background:var(--surface2); color:#fff; border:1px solid var(--border);" onclick="addGpaRow()">➕ Fan qo'shish</button>
    </div>

    <div id="view-syllabus" class="view-section">
        <div class="card" style="border-left:4px solid var(--accent);">
            <div style="font-size:15px; font-weight:600; margin-bottom:10px;">Academic Syllabus</div>
            <p style="font-size:13px; color:var(--muted); line-height:1.5;">Kerakli fanning tugmasini bosing. Fayl bot orqali sizga PDF formatida yuboriladi.</p>
        </div>
        <div id="syllabus-list"></div>
    </div>

    <div id="view-profs" class="view-section">
        <div class="search-box" style="margin-bottom:16px;">
            <input type="text" id="search-prof" placeholder="🔍 Professor ismi yoki kafedra...">
        </div>
        <div id="prof-list"></div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="switchView('resit')" id="nav-resit">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            Resit
        </button>
        <button class="nav-item" onclick="switchView('gpa')" id="nav-gpa">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            GPA
        </button>
        <button class="nav-item" onclick="switchView('syllabus')" id="nav-syllabus">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            Syllabus
        </button>
        <button class="nav-item" onclick="switchView('profs')" id="nav-profs">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 1.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            Profs
        </button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        // 1. VIEW SWITCHER
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            const targetSection = document.getElementById(`view-${viewId}`);
            if (targetSection) targetSection.classList.add('active');

            const activeTab = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(viewId));
            if (activeTab) activeTab.classList.add('active');

            const activeNavItem = document.getElementById(`nav-${viewId}`);
            if (activeNavItem) activeNavItem.classList.add('active');
        }

        // 2. RESIT EXAMS LOGIC (BARQAROR VA STRUKTURAVIY TO'G'RILANGAN)
        const API_URL = "https://script.google.com/macros/s/AKfycbwo2j58xCCcVHRbgifOZijiQl906VvM0GdeSg1ES_1mTfd8eTuUavbd8QD5cUjyZUDF8w/exec";
        let allExams = [];
        let filterFailOnly = false;

        async function initExams() {
            const div = document.getElementById('exam-list');
            div.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">Ma\'lumot yuklanmoqda...</div>';
            try {
                const res = await fetch(API_URL);
                const rawData = await res.json();
                const rows = rawData.slice(1); // Google Sheets sarlavha qatorini olib tashlaydi

                // Ustunlar o'rni struktura bo'yicha to'g'rilandi: r[1]=Guruh, r[2]=Xona, r[3]=Fan nomi, r[4]=Ruxsat holati
                allExams = rows.map(r => ({
                    name: r[0] ? r[0].toString().trim() : 'Noma\'lum',
                    group: r[1] ? r[1].toString().trim() : '',
                    room: r[2] ? r[2].toString().trim() : '',
                    subject: r[3] ? r[3].toString().trim() : '',
                    allowed: r[4] === true || r[4] === 'true' || r[4] === 'ALLOWED' || r[4] === 'Allowed'
                }));

                // Dropdown qidiruv filtrlarini unikal qiymatlar bilan to'ldirish
                const groups = [...new Set(allExams.map(i => i.group).filter(Boolean))].sort();
                const rooms = [...new Set(allExams.map(i => i.room).filter(Boolean))].sort();
                const subjects = [...new Set(allExams.map(i => i.subject).filter(Boolean))].sort();

                document.getElementById('search-group').innerHTML = '<option value="">🏫 Guruhni tanlang</option>' + 
                    groups.map(g => `<option value="${g}">${g}</option>`).join('');

                document.getElementById('search-room').innerHTML = '<option value="">🔑 Xonani tanlang</option>' + 
                    rooms.map(r => `<option value="${r}">${r}</option>`).join('');

                document.getElementById('search-subject').innerHTML = '<option value="">📚 Fanni tanlang</option>' + 
                    subjects.map(s => `<option value="${s}">${s}</option>`).join('');

                renderExams();
            } catch(e) {
                div.innerHTML = '<div style="text-align:center;color:#ff4d4d;padding:20px;">Ma\'lumotni yuklashda xatolik yuz berdi.</div>';
                console.error(e);
            }
        }

        function renderExams() {
            const div = document.getElementById('exam-list');
            const nameQ = document.getElementById('search-name').value.toLowerCase().trim();
            const groupQ = document.getElementById('search-group').value;
            const roomQ = document.getElementById('search-room').value;
            const subjectQ = document.getElementById('search-subject').value.toLowerCase().trim();

            const filtered = allExams.filter(item => {
                const matchesName = item.name.toLowerCase().includes(nameQ);
                const matchesGroup = !groupQ || item.group === groupQ;
                const matchesRoom = !roomQ || item.room === roomQ;
                const matchesSubject = !subjectQ || item.subject.toLowerCase().trim().includes(subjectQ);
                const matchesFail = !filterFailOnly || !item.allowed;

                return matchesName && matchesGroup && matchesRoom && matchesSubject && matchesFail;
            });

            if (filtered.length === 0) {
                div.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">Mos ma\'lumot topilmadi.</div>';
                return;
            }

            div.innerHTML = filtered.map(item => `
                <div class="card" style="border-left: 4px solid ${item.allowed ? 'var(--accent2)' : '#ff4d4d'};">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="flex:1;">
                            <div style="font-size:15px; font-weight:600;">${item.name}</div>
                            <div style="font-size:12px; color:var(--muted); margin-top:2px;">
                                <span>🏫 Guruh: ${item.group}</span> | <span>🔑 Xona: ${item.room}</span>
                            </div>
                            <div style="font-size:13px; color:var(--accent3); margin-top:4px;">📚 ${item.subject}</div>
                        </div>
                        <div style="font-size:20px; margin-left:8px;">${item.allowed ? '✅' : '🚫'}</div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('search-name').addEventListener('input', renderExams);
        document.getElementById('search-group').addEventListener('change', renderExams);
        document.getElementById('search-room').addEventListener('change', renderExams);
        document.getElementById('search-subject').addEventListener('change', renderExams);
        document.getElementById('btn-fail-toggle').addEventListener('click', function() {
            filterFailOnly = !filterFailOnly;
            this.classList.toggle('active', filterFailOnly);
            renderExams();
        });

        // 3. GPA CALCULATOR LOGIC
        const DEFAULT_SUBJECTS = ["Introduction to T.L", "Programming 1", "Discrete Math", "General English 2", "Math Analysis 2", "Analytical Geometry", "Calculus 2"];
        
        function initGpa() {
            const container = document.getElementById('gpa-rows');
            container.innerHTML = '';
            DEFAULT_SUBJECTS.forEach(sub => addGpaRow(sub));
            calculateGpa();
        }

        function addGpaRow(name = '') {
            const container = document.getElementById('gpa-rows');
            const row = document.createElement('div');
            row.className = 'card';
            row.style.padding = '10px';
            row.style.display = 'flex';
            row.style.gap = '8px';
            row.style.alignItems = 'center';
            row.style.marginBottom = '8px';

            row.innerHTML = `
                <input type="text" value="${name}" placeholder="Fan nomi" style="flex:2; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:8px; border-radius:8px; font-size:13px; min-width:0;">
                <input type="number" class="credit-input" placeholder="Cr" min="1" max="10" value="3" style="width:50px; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:8px; border-radius:8px; text-align:center; font-size:13px;">
                <select class="grade-select" style="flex:1; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:8px; border-radius:8px; font-size:13px; min-width:0;">
                    <option value="4.5">A+</option><option value="4.0">A</option>
                    <option value="3.5">B+</option><option value="3.0">B</option>
                    <option value="2.5">C+</option><option value="2.0">C</option>
                    <option value="1.5">D+</option><option value="1.0">D</option>
                    <option value="0.0" selected>F</option>
                </select>
                <button onclick="this.parentElement.remove(); calculateGpa();" style="background:none; border:none; color:#ff4d4d; font-size:16px; cursor:pointer; padding:0 4px;">✕</button>
            `;
            container.appendChild(row);
            row.querySelector('.credit-input').addEventListener('input', calculateGpa);
            row.querySelector('.grade-select').addEventListener('change', calculateGpa);
        }

        function calculateGpa() {
            let totalCredits = 0, totalPoints = 0;
            document.querySelectorAll('#gpa-rows .card').forEach(row => {
                const credit = parseFloat(row.querySelector('.credit-input').value) || 0;
                const grade = parseFloat(row.querySelector('.grade-select').value) || 0;
                totalCredits += credit;
                totalPoints += (credit * grade);
            });
            const gpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : "0.00";
            document.getElementById('gpa-result').innerText = gpa;
        }

        // 4. SYLLABUS LOGIC
        function initSyllabus() {
            const container = document.getElementById('syllabus-list');
            container.innerHTML = DEFAULT_SUBJECTS.map(sub => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-size:14px; font-weight:500;">${sub}</span>
                    <button class="tab-btn active" style="padding:6px 12px; font-size:12px; border-radius:8px;" onclick="sendSyllabus('${sub}')">📥 Yuklash</button>
                </div>
            `).join('');
        }

        function sendSyllabus(subjectName) {
            if (tg) {
                tg.sendData(JSON.stringify({ type: `syllabus_${subjectName}` }));
                tg.close();
            } else {
                alert(`Bot orqali yuborilmoqda: ${subjectName}`);
            }
        }

        // 5. PROFESSORS LOGIC
        const PROFS = [
            {n: "Dr. Alisher Toshmatov", e: "a.toshmatov@npuu.uz", d: "Informatika"},
            {n: "Prof. Elena Ivanova", e: "e.ivanova@npuu.uz", d: "Xorijiy tillar"},
            {n: "Ozodakhon Shukurillaeva", e: "o.shukurillaeva@npuu.uz", d: "Education"},
            {n: "Albina Suleymanova", e: "a.suleymanova@npuu.uz", d: "Education"}
        ];

        function renderProfs(data) {
            document.getElementById('prof-list').innerHTML = data.map(p => `
                <div class="card" style="margin-bottom:8px;">
                    <div style="font-size:11px; color:var(--accent3); font-weight:700;">${p.d}</div>
                    <div style="font-size:15px; font-weight:600; margin:2px 0;">${p.n}</div>
                    <div style="font-size:12px; color:var(--muted);">✉️ ${p.e}</div>
                </div>
            `).join('');
        }

        document.getElementById('search-prof').addEventListener('input', (e) => {
            const t = e.target.value.toLowerCase();
            renderProfs(PROFS.filter(p => p.n.toLowerCase().includes(t) || p.d.toLowerCase().includes(t)));
        });

        // OYNANI BOSHLANG'ICH YUKLASH
        window.onload = () => {
            initExams();
            initGpa();
            initSyllabus();
            renderProfs(PROFS);
        };
    </script>
</body>
</html>
